<div class="max-w-4xl mx-auto p-6">
  <h2 class="text-2xl font-semibold text-gray-800 mb-6">Mi cuenta</h2>

  <div class="bg-white shadow-md rounded-2xl p-6 border border-gray-100">
    <div class="flex flex-col md:flex-row md:items-start gap-6">
      <!-- Avatar -->
      <div class="flex flex-col items-center md:w-1/3">
        <img
          [src]="userData?.image || 'https://api.dicebear.com/7.x/initials/svg?seed=Usuario'"
          alt="Avatar usuario"
          class="w-28 h-28 rounded-full shadow-sm border border-gray-200 object-cover"
        />
        <button
          class="mt-3 text-sm text-blue-600 hover:underline"
          type="button"
        >
          Cambiar foto
        </button>
      </div>

      <!-- Formulario -->
      <form
        [formGroup]="profileForm"
        (ngSubmit)="onSubmit()"
        class="flex-1 space-y-4"
      >
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
              Nombre
            </label>
            <input
              type="text"
              formControlName="name"
              class="w-full rounded-lg border-gray-300 focus:border-blue-500 focus:ring focus:ring-blue-200 transition"
              placeholder="Tu nombre"
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
              Apellido
            </label>
            <input
              type="text"
              formControlName="lastname"
              class="w-full rounded-lg border-gray-300 focus:border-blue-500 focus:ring focus:ring-blue-200 transition"
              placeholder="Tu apellido"
            />
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Correo electrónico
          </label>
          <input
            type="email"
            formControlName="email"
            class="w-full rounded-lg border-gray-300 focus:border-blue-500 focus:ring focus:ring-blue-200 transition"
            placeholder="tucorreo@ejemplo.com"
          />
        </div>

        <!-- Botones -->
        <div class="flex justify-end gap-3 pt-4">
          <button
            type="button"
            (click)="getProfile()"
            class="px-4 py-2 text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200 transition"
          >
            Cancelar
          </button>
          <button
            type="submit"
            class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition"
          >
            Guardar cambios
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
