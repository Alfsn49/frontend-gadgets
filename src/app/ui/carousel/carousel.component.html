<!-- carousel.component.html -->
<div id="custom-carousel" class="relative w-full overflow-hidden rounded-2xl shadow-2xl">
  <!-- Contenedor principal del carrusel -->
  <div class="relative h-64 sm:h-80 md:h-96 lg:h-[500px] overflow-hidden">
    <!-- Imágenes -->
    <div *ngFor="let image of images; let i = index" 
         class="absolute inset-0 transition-all duration-700 ease-in-out transform"
         [ngClass]="{
           'opacity-100 translate-x-0': currentIndex === i,
           'opacity-0 translate-x-full': currentIndex < i,
           'opacity-0 -translate-x-full': currentIndex > i
         }">
      <img [src]="image" 
           class="w-full h-full object-cover" 
           [alt]="'Promoción ' + (i + 1)">
      
      <!-- Overlay degradado para mejor legibilidad -->
      <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-black/30 to-transparent"></div>
      
      <!-- Texto descriptivo opcional -->
      <div class="absolute bottom-8 left-8 right-8 text-white z-20">
        <h3 class="text-2xl md:text-3xl font-bold mb-2">Ofertas Especiales</h3>
        <p class="text-lg md:text-xl opacity-90">Hasta 50% de descuento en productos seleccionados</p>
      </div>
    </div>
  </div>

  <!-- Controles de navegación -->
  <button type="button"
          class="absolute top-1/2 left-4 -translate-y-1/2 z-30 flex items-center justify-center w-12 h-12 rounded-full bg-white/20 backdrop-blur-sm hover:bg-white/30 transition-all duration-300 group"
          (click)="prevImage()">
    <svg class="w-6 h-6 text-white group-hover:scale-110 transition-transform" 
         fill="none" 
         stroke="currentColor" 
         viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
  </button>
  
  <button type="button"
          class="absolute top-1/2 right-4 -translate-y-1/2 z-30 flex items-center justify-center w-12 h-12 rounded-full bg-white/20 backdrop-blur-sm hover:bg-white/30 transition-all duration-300 group"
          (click)="nextImage()">
    <svg class="w-6 h-6 text-white group-hover:scale-110 transition-transform" 
         fill="none" 
         stroke="currentColor" 
         viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
    </svg>
  </button>

  <!-- Indicadores de puntos -->
  <div class="absolute bottom-4 left-1/2 -translate-x-1/2 z-30 flex space-x-3">
    <button *ngFor="let image of images; let i = index"
            (click)="goToImage(i)"
            class="w-3 h-3 rounded-full transition-all duration-300"
            [ngClass]="{
              'bg-white w-8': currentIndex === i,
              'bg-white/50 hover:bg-white/70': currentIndex !== i
            }"
            [attr.aria-label]="'Ir a imagen ' + (i + 1)">
    </button>
  </div>
</div>
